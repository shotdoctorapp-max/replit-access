openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analysis
    description: Shooting form analysis operations
  - name: bug-reports
    description: In-app bug reporting
  - name: waitlist
    description: Beta waitlist signups
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /waitlist:
    post:
      operationId: joinWaitlist
      tags: [waitlist]
      summary: Join the beta waitlist
      description: Stores an email address for the beta waitlist. Duplicate emails are silently ignored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaitlistSignup"
      responses:
        "200":
          description: Email stored (or already exists)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistResult"
        "400":
          description: Bad request
        "500":
          description: Server error
  /bug-reports:
    post:
      operationId: createBugReport
      tags: [bug-reports]
      summary: Submit a bug report
      description: Stores a user-submitted bug report enriched with device information
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBugReportRequest"
      responses:
        "201":
          description: Bug report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBugReportResponse"
        "400":
          description: Bad request
        "500":
          description: Server error
  /analyze:
    post:
      operationId: analyzeForm
      tags: [analysis]
      summary: Analyze shooting form
      description: Analyzes a basketball shooting form image and returns biomechanical feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResponse"
        "400":
          description: Bad request
        "500":
          description: Server error
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CreateBugReportRequest:
      type: object
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 2000
        deviceInfo:
          type: object
          additionalProperties: true
      required:
        - message

    CreateBugReportResponse:
      type: object
      properties:
        id:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - createdAt

    AnalyzeRequest:
      type: object
      properties:
        imageBase64:
          type: string
        mimeType:
          type: string
      required:
        - imageBase64

    ComponentScore:
      type: object
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 100
        feedback:
          type: string
        adjustments:
          type: array
          items:
            type: string
          description: 2-4 actionable correction steps; only present when score < 75
      required:
        - score
        - feedback

    FrameAnnotation:
      type: object
      properties:
        frameIndex:
          type: integer
        zone:
          type: string
        x:
          type: number
        y:
          type: number
        severity:
          type: string
          enum: [good, warning, issue]
        label:
          type: string
      required:
        - frameIndex
        - zone
        - x
        - y
        - severity
        - label

    DrillRecommendation:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        targetArea:
          type: string
      required:
        - name
        - description
        - targetArea

    AnalysisComponents:
      type: object
      properties:
        stance:
          $ref: "#/components/schemas/ComponentScore"
        hipAlignment:
          $ref: "#/components/schemas/ComponentScore"
        elbowPosition:
          $ref: "#/components/schemas/ComponentScore"
        gripPosition:
          $ref: "#/components/schemas/ComponentScore"
        setPoint:
          $ref: "#/components/schemas/ComponentScore"
        followThrough:
          $ref: "#/components/schemas/ComponentScore"
        balance:
          $ref: "#/components/schemas/ComponentScore"
        eyeTracking:
          $ref: "#/components/schemas/ComponentScore"
      required:
        - stance
        - hipAlignment
        - elbowPosition
        - gripPosition
        - setPoint
        - followThrough
        - balance
        - eyeTracking

    AnalysisResult:
      type: object
      properties:
        overallScore:
          type: integer
          minimum: 0
          maximum: 100
        summary:
          type: string
        components:
          $ref: "#/components/schemas/AnalysisComponents"
        keyStrengths:
          type: array
          items:
            type: string
        priorityFixes:
          type: array
          items:
            type: string
        drillRecommendations:
          type: array
          items:
            $ref: "#/components/schemas/DrillRecommendation"
        annotations:
          type: array
          items:
            $ref: "#/components/schemas/FrameAnnotation"
      required:
        - overallScore
        - summary
        - components
        - keyStrengths
        - priorityFixes
        - drillRecommendations

    AnalyzeResponse:
      type: object
      properties:
        analysis:
          $ref: "#/components/schemas/AnalysisResult"
        timestamp:
          type: string
      required:
        - analysis
        - timestamp

    WaitlistSignup:
      type: object
      properties:
        email:
          type: string
          format: email
        source:
          type: string
      required:
        - email

    WaitlistResult:
      type: object
      properties:
        success:
          type: boolean
        alreadyRegistered:
          type: boolean
      required:
        - success
        - alreadyRegistered
